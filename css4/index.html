!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog Kelompok 5</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Plus+Jakarta+Sans:wght@300;400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>

  :root {
    --c60: #ffffff;
    --c60-alt: #f8f8f6;
    --c60-soft: #f2f2ef;
    --c30: #111110;
    --c30-mid: #3a3a38;
    --c30-muted: #9a9a96;
    --c10: #16a34a;
    --c10-light: #22c55e;
    --c10-pale: rgba(22,163,74,0.07);
    --border: #e8e8e4;

    --s1: 1.618rem;
    --s2: 2.618rem;
    --s3: 4.236rem;
    --s4: 6.854rem;

    --col-wide: 61.8%;
    --col-narrow: 38.2%;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--c60);
    color: var(--c30);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 16px;
    line-height: 1.618;
    overflow-x: hidden;
  }

  .progress {
    position: fixed;
    top: 0; left: 0;
    height: 2px;
    width: 0%;
    background: var(--c10);
    z-index: 1000;
    transition: width 0.1s linear;
  }

  .topbar {
    background: var(--c30);
    color: rgba(255,255,255,0.6);
    text-align: center;
    padding: 9px;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
  }

  .topbar b { color: #fff; }

  header {
    border-bottom: 1px solid var(--border);
    background: var(--c60);
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: 0 1px 0 var(--border);
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px 40px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 20px;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .header-left span {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--c30-muted);
  }

  .header-left .dot {
    width: 6px; height: 6px;
    background: var(--c10);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .site-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.7rem;
    font-weight: 700;
    text-align: center;
    letter-spacing: -0.02em;
  }

  .site-title span { color: var(--c10); }

  .header-right {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 12px;
  }

  .search-wrap { position: relative; }

  .search-wrap input {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    padding: 8px 14px 8px 34px;
    border: 1px solid var(--border);
    background: var(--c60-alt);
    color: var(--c30);
    outline: none;
    border-radius: 4px;
    width: 160px;
    transition: border-color 0.25s, width 0.3s;
  }

  .search-wrap input:focus { border-color: var(--c10); width: 200px; }
  .search-wrap input::placeholder { color: var(--c30-muted); }

  .search-icon {
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--c30-muted);
    font-size: 0.8rem;
  }

  /* ===== NOTIFIKASI BELL ===== */
  .notif-wrap {
    position: relative;
  }

  .notif-btn {
    width: 36px; height: 36px;
    border: 1px solid var(--border);
    border-radius: 50%;
    background: var(--c60-alt);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    transition: all 0.2s;
    position: relative;
  }

  .notif-btn:hover {
    background: var(--c60-soft);
    border-color: var(--c30-muted);
  }

  .notif-badge {
    position: absolute;
    top: -4px; right: -4px;
    min-width: 17px; height: 17px;
    background: #dc2626;
    color: white;
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    font-weight: 400;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 4px;
    border: 2px solid var(--c60);
    opacity: 0;
    transform: scale(0.5);
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
  }

  .notif-badge.visible {
    opacity: 1;
    transform: scale(1);
  }

  .notif-badge.shake {
    animation: bellShake 0.4s ease;
  }

  @keyframes bellShake {
    0%, 100% { transform: scale(1) rotate(0deg); }
    20% { transform: scale(1) rotate(-12deg); }
    40% { transform: scale(1) rotate(10deg); }
    60% { transform: scale(1) rotate(-8deg); }
    80% { transform: scale(1) rotate(6deg); }
  }

  /* ===== NOTIFIKASI DROPDOWN ===== */
  .notif-dropdown {
    position: absolute;
    top: calc(100% + 10px);
    right: 0;
    width: 320px;
    background: var(--c60);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    z-index: 300;
    overflow: hidden;
    opacity: 0;
    pointer-events: none;
    transform: translateY(-8px);
    transition: opacity 0.22s ease, transform 0.22s ease;
  }

  .notif-dropdown.open {
    opacity: 1;
    pointer-events: all;
    transform: translateY(0);
  }

  .notif-head {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .notif-head-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--c30);
  }

  .notif-clear {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--c10);
    cursor: pointer;
    transition: opacity 0.2s;
    border: none;
    background: none;
    padding: 0;
  }

  .notif-clear:hover { opacity: 0.65; }

  .notif-list {
    max-height: 320px;
    overflow-y: auto;
  }

  .notif-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 13px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.18s;
    position: relative;
  }

  .notif-item:last-child { border-bottom: none; }
  .notif-item:hover { background: var(--c60-alt); }

  .notif-item.unread { background: var(--c10-pale); }
  .notif-item.unread:hover { background: rgba(22,163,74,0.12); }

  .notif-icon {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .ni-green { background: var(--c10-pale); }
  .ni-blue { background: rgba(59,130,246,0.08); }
  .ni-amber { background: rgba(245,158,11,0.08); }
  .ni-red { background: rgba(220,38,38,0.08); }

  .notif-text { flex: 1; }

  .notif-msg {
    font-size: 0.82rem;
    color: var(--c30-mid);
    line-height: 1.5;
    margin-bottom: 3px;
  }

  .notif-msg b { color: var(--c30); font-weight: 600; }

  .notif-time {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    color: var(--c30-muted);
    letter-spacing: 0.06em;
  }

  .unread-dot {
    width: 6px; height: 6px;
    background: var(--c10);
    border-radius: 50%;
    position: absolute;
    top: 50%; right: 14px;
    transform: translateY(-50%);
    flex-shrink: 0;
  }

  .notif-empty {
    padding: 32px 16px;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    color: var(--c30-muted);
    text-transform: uppercase;
  }

  /* ===== TOAST ===== */
  .toast-container {
    position: fixed;
    top: 80px;
    right: 20px;
    z-index: 500;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
  }

  .toast {
    background: var(--c30);
    color: white;
    padding: 10px 16px;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    pointer-events: all;
    transform: translateX(120%);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    max-width: 280px;
  }

  .toast.show { transform: translateX(0); }
  .toast.hide { transform: translateX(120%); transition: transform 0.25s ease-in; }

  .toast-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ===== NAV ===== */
  nav {
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: center;
    gap: 0;
    max-width: 100%;
    overflow-x: auto;
  }

  .nav-item {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 12px 22px;
    color: var(--c30-muted);
    text-decoration: none;
    border-right: 1px solid var(--border);
    transition: all 0.2s;
    white-space: nowrap;
  }

  .nav-item:first-child { border-left: 1px solid var(--border); }
  .nav-item:hover { color: var(--c30); background: var(--c60-alt); }
  .nav-item.active { color: var(--c10); border-bottom: 2px solid var(--c10); }

  .wrapper {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 40px;
  }

  .hero {
    display: grid;
    grid-template-columns: var(--col-wide) var(--col-narrow);
    gap: 0;
    border-bottom: 1px solid var(--border);
    margin-top: 0;
  }

  .hero-main {
    padding: var(--s2) var(--s2) var(--s2) 0;
    border-right: 1px solid var(--border);
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--c10-pale);
    color: var(--c10);
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 2px;
    margin-bottom: 16px;
  }

  .hero-badge::before {
    content: '';
    width: 5px; height: 5px;
    background: var(--c10);
    border-radius: 50%;
  }

  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 3.5vw, 2.8rem);
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.025em;
    margin-bottom: 16px;
    cursor: pointer;
    transition: color 0.25s;
  }

  .hero-title:hover { color: var(--c10); }

  .hero-excerpt {
    font-size: 1rem;
    color: var(--c30-mid);
    line-height: 1.75;
    margin-bottom: var(--s1);
    max-width: 500px;
  }

  .hero-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--c10-pale);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    font-weight: 400;
    color: var(--c10);
  }

  .meta-author { font-size: 0.82rem; font-weight: 600; color: var(--c30); }
  .meta-sep { color: var(--c30-muted); font-size: 0.75rem; }

  .meta-date, .meta-read {
    font-family: 'DM Mono', monospace;
font-size: 0.62rem;
    color: var(--c30-muted);
    letter-spacing: 0.08em;
  }

  .meta-read {
    color: var(--c10);
    background: var(--c10-pale);
    padding: 3px 8px;
    border-radius: 2px;
  }

  .hero-sidebar { display: flex; flex-direction: column; }

  .side-article {
    padding: 20px var(--s1);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.2s;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 14px;
    align-items: start;
  }

  .side-article:last-child { border-bottom: none; }
  .side-article:hover { background: var(--c60-alt); }

  .side-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--border);
    line-height: 1;
    min-width: 28px;
  }

  .side-cat {
    font-family: 'DM Mono', monospace;
    font-size: 0.57rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--c10);
    margin-bottom: 5px;
  }

  .side-title {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    font-weight: 600;
    line-height: 1.35;
    margin-bottom: 5px;
    transition: color 0.2s;
  }

  .side-article:hover .side-title { color: var(--c10); }

  .side-meta {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    color: var(--c30-muted);
    letter-spacing: 0.08em;
  }

  .sec-label {
    display: flex;
    align-items: center;
    gap: var(--s1);
    padding: var(--s1) 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: var(--s1);
  }

  .sec-label-text {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--c30);
    white-space: nowrap;
  }

  .sec-line { flex: 1; height: 1px; background: var(--border); }

  .sec-link {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--c10);
    text-decoration: none;
    white-space: nowrap;
    transition: opacity 0.2s;
  }

  .sec-link:hover { opacity: 0.7; }

  .content-layout {
    display: grid;
    grid-template-columns: var(--col-wide) var(--col-narrow);
    gap: var(--s2);
    padding: var(--s2) 0;
  }

  .article-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--s1);
    margin-bottom: var(--s2);
  }

  .article-card {
    cursor: pointer;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    transition: box-shadow 0.3s, transform 0.3s;
    background: var(--c60);
  }

  .article-card:hover {
    box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    transform: translateY(-3px);
  }

  .card-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.2rem;
    position: relative;
    overflow: hidden;
  }

  .ct-1 { background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%); }
  .ct-2 { background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); }
  .ct-3 { background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%); }
  .ct-4 { background: linear-gradient(135deg, #fce7f3 0%, #fbcfe8 100%); }

  .card-body { padding: 16px; }

  .card-cat {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--c10);
    margin-bottom: 8px;
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 600;
    line-height: 1.35;
    margin-bottom: 8px;
    transition: color 0.2s;
  }

  .article-card:hover .card-title { color: var(--c10); }

  .card-excerpt {
    font-size: 0.83rem;
    color: var(--c30-muted);
    line-height: 1.65;
    margin-bottom: 12px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .card-author { display: flex; align-items: center; gap: 8px; }

  .card-author-name {
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--c30-mid);
  }

  .card-read {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    color: var(--c30-muted);
    letter-spacing: 0.08em;
  }

  .article-list-item {
    display: grid;
    grid-template-columns: var(--col-narrow) 1fr;
    gap: var(--s1);
    padding: var(--s1) 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .article-list-item:last-child { border-bottom: none; }
  .article-list-item:hover { opacity: 0.75; }

  .list-thumb {
    aspect-ratio: 4/3;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    overflow: hidden;
  }

  .lt-1 { background: linear-gradient(135deg, #ede9fe 0%, #ddd6fe 100%); }
  .lt-2 { background: linear-gradient(135deg, #ffedd5 0%, #fed7aa 100%); }

  .article-list-item:hover .card-title { color: var(--c10); }

  .sidebar {}

  .members-card {
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: var(--s1);
  }

  .members-head {
    background: var(--c30);
    color: white;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .members-head-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }

  .members-count {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    color: rgba(255,255,255,0.4);
  }

  .member-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    transition: background 0.2s;
    cursor: pointer;
  }

  .member-item:last-child { border-bottom: none; }
  .member-item:hover { background: var(--c60-alt); }

  .member-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--c10-pale);
    border: 1px solid rgba(22,163,74,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    font-weight: 400;
    color: var(--c10);
    flex-shrink: 0;
  }

  .member-info { flex: 1; }

  .member-name {
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--c30);
    margin-bottom: 2px;
  }

  .member-role {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    color: var(--c30-muted);
    text-transform: uppercase;
  }

  .member-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--border);
    font-weight: 300;
  }

  .newsletter-box {
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: var(--s1);
    margin-bottom: var(--s1);
    background: var(--c60-alt);
  }

  .nl-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--c10);
    margin-bottom: 10px;
  }

  .nl-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 8px;
  }

  .nl-desc {
    font-size: 0.82rem;
    color: var(--c30-muted);
    line-height: 1.65;
    margin-bottom: 14px;
  }

  .nl-input {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border);
    background: var(--c60);
    color: var(--c30);
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    outline: none;
    border-radius: 3px;
    margin-bottom: 8px;
    transition: border-color 0.25s;
  }

  .nl-input:focus { border-color: var(--c10); }
  .nl-input::placeholder { color: var(--c30-muted); }

  .nl-btn {
    width: 100%;
    padding: 9px;
    background: var(--c10);
    color: white;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.22em;
