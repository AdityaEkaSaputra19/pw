<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Login - Pemrograman Web</title>
    <style>
        /* Gaya sederhana agar tampilan mirip dengan kotak di sketsa */
        .login-container {
            border: 2px solid #000;
            padding: 20px;
            width: 300px;
            margin: 50px auto;
            font-family: Arial, sans-serif;
        }
        .form-group {
            margin-bottom: 15px;
        }
        input {
            width: 100%;
            margin-top: 5px;
        }
        .button-group {
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Form Login</h2>
        
        <div class="form-group">
            <label for="us">Username:</label>
            <input type="text" id="us" placeholder="Masukkan username">
        </div>

        <div class="form-group">
            <label for="s">Sandi:</label>
            <input type="password" id="s" placeholder="Masukkan sandi">
        </div>

        <div class="button-group">
            <button id="btnlogin">Login</button>
            
            <button id="btncancel">Cancel</button>
        </div>
    </div>

    <script>
        // Contoh implementasi DOM sesuai catatan di papan tulis
        const btnLogin = document.getElementById('btnlogin');
        const us = document.getElementById('us');

        btnLogin.addEventListener('click', function() {
            // Logika sederhana: mengubah nilai username saat tombol login diklik
            us.value = "Username";
            console.log("Tombol login telah diklik!");
        });
    </script>

</body>
</html>
