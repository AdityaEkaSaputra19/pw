<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Retro Neon</title>

<style>
    body {
        background: radial-gradient(circle at top, #1a0026, #000);
        font-family: 'Courier New', monospace;
        color: #fff;
    }

    .login-container {
        width: 320px;
        margin: 100px auto;
        padding: 25px;
        border: 2px solid #ff00ff;
        border-radius: 15px;
        background: rgba(0,0,0,0.7);
        box-shadow: 0 0 20px #ff00ff, 0 0 40px #8000ff;
    }

    h2 {
        text-align: center;
        color: #ff66ff;
    }

    .form-group {
        margin-bottom: 15px;
    }

    input {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        background: black;
        border: 1px solid #ff00ff;
        color: #fff;
        border-radius: 8px;
    }

    .button-group {
        display: flex;
        gap: 10px;
    }

    button {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        color: white;
    }

    #btnlogin {
        background: linear-gradient(45deg, #ff00ff, #8000ff);
    }

    #btncancel {
        background: linear-gradient(45deg, #ff4da6, #ff00cc);
    }

    .hasil {
        text-align: center;
        margin-top: 15px;
        font-size: 18px;
        color: #00ffcc;
    }
</style>
</head>

<body>

<div class="login-container">
    <h2>LOGIN SYSTEM</h2>

    <div class="form-group">
        <label>Username:</label>
        <input type="text" id="us">
    </div>

    <div class="form-group">
        <label>Password:</label>
        <input type="password" id="pw">
    </div>

    <div class="button-group">
        <button id="btnlogin">LOGIN</button>
        <button id="btncancel">CANCEL</button>
    </div>

    <div class="hasil" id="hasil"></div>
</div>

<script>
    const btnLogin = document.getElementById("btnlogin");
    const btnCancel = document.getElementById("btncancel");
    const us = document.getElementById("us");
    const pw = document.getElementById("pw");
    const hasil = document.getElementById("hasil");

    btnLogin.addEventListener("click", function() {
        // langsung tampil tanpa validasi
        hasil.innerText = "Username";
    });

    btnCancel.addEventListener("click", function() {
        us.value = "";
        pw.value = "";
        hasil.innerText = "";
    });
</script>

</body>
</html>
